<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Monitoring Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h2 { color: #333; margin-bottom: 1.5rem; }
        .card { background: #f8f9fa; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; border-left: 5px solid #007bff; }
        .card.hum { border-left-color: #28a745; }
        .label { font-size: 0.9rem; color: #666; text-transform: uppercase; }
        .value { font-size: 2rem; font-weight: bold; color: #222; }
        .unit { font-size: 1rem; color: #888; }
        #status { font-size: 0.8rem; margin-top: 1rem; color: orange; }
    </style>
</head>
<body>

<div class="container">
    <h2>Monitoring Sensor</h2>
    
    <div class="card">
        <div class="label">Temperatur</div>
        <div class="value" id="temp">--</div>
        <span class="unit">°C</span>
    </div>

    <div class="card hum">
        <div class="label">Kelembapan</div>
        <div class="value" id="hum">--</div>
        <span class="unit">% RH</span>
    </div>

    <div id="status">Menghubungkan ke Broker...</div>
</div>

<script>
    // Konfigurasi MQTT
    const broker = "test.mosquitto.org";
    const port = 8081; // Port Websocket (SSL) untuk Mosquitto
    const clientID = "web_client_" + Math.random().toString(16).substr(2, 8);

    const client = new Paho.MQTT.Client(`wss://${broker}:${port}/mqtt`, clientID);

    // Callback saat koneksi hilang
    client.onConnectionLost = (responseObject) => {
        document.getElementById("status").innerHTML = "Koneksi Terputus: " + responseObject.errorMessage;
        document.getElementById("status").style.color = "red";
    };

    // Callback saat pesan diterima
    client.onMessageArrived = (message) => {
        console.log("Pesan diterima: " + message.payloadString);
        if (message.destinationName === "zen_indah/suhu") {
            document.getElementById("temp").innerText = message.payloadString;
        } else if (message.destinationName === "zen_indah/hum") {
            document.getElementById("hum").innerText = message.payloadString;
        }
    };

    // Opsi koneksi
    const options = {
        useSSL: true,
        onSuccess: () => {
            document.getElementById("status").innerHTML = "Terhubung ke Broker!";
            document.getElementById("status").style.color = "green";
            // Subscribe ke topik yang sama dengan Arduino
            client.subscribe("zen_indah/suhu");
            client.subscribe("zen_indah/hum");
        },
        onFailure: (message) => {
            document.getElementById("status").innerHTML = "Gagal Terhubung: " + message.errorMessage;
        }
    };

    client.connect(options);
</script>

</body>
</html>
